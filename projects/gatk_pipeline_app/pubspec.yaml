name: gatk_pipeline_app
description: Interactive GATK Pipeline Builder with GetX
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  process_run: ^0.13.0
  flutter_animate: ^4.5.0
  json_annotation: ^4.8.1
  uuid: ^4.3.3
  reorderables: ^0.6.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
